}

let questions = [];
let currentIndex = 0;
let score = 0;
let miss = 0;
let answered = false;

const packageLabel = document.getElementById("packageLabel");
const questionEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const messageEl = document.getElementById("message");
const scoreEl = document.getElementById("score");
const missEl = document.getElementById("miss");
const qnumEl = document.getElementById("qnum");
const totalEl = document.getElementById("total");

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function startGame(){
  questions = shuffle([...quizData]);
  currentIndex = 0;
  score = 0;
  miss = 0;
  answered = false;

  totalEl.textContent = questions.length;
  scoreEl.textContent = score;
  missEl.textContent = miss;

  showQuestion();
}

function showQuestion(){
  answered = false;
  messageEl.textContent = "";
  messageEl.className = "";

  if(currentIndex >= questions.length){
    packageLabel.textContent = "終了";
    questionEl.textContent = `ゲーム終了！スコアは ${score} 点です`;
    choicesEl.innerHTML = "";
    return;
  }

  const q = questions[currentIndex];

  qnumEl.textContent = currentIndex + 1;
  packageLabel.textContent = q.item;
  questionEl.textContent = "この荷物はどこに仕分ける？";

  choicesEl.innerHTML = "";

  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(choice);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(choice){
  if(answered) return;
  answered = true;

  const q = questions[currentIndex];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(btn => btn.disabled = true);

  if(choice === q.answer){
    score += 10;
    messageEl.textContent = "✅ 正解！次の荷物へ進みます";
    messageEl.className = "correct";
  }else{
    miss++;
    messageEl.textContent = `❌ ミス！正解は「${q.answer}」`;
    messageEl.className = "wrong";
  }

  scoreEl.textContent = score;
  missEl.textContent = miss;

  setTimeout(() => {
    currentIndex++;
    showQuestion();
  }, 900);
}

function restartGame(){
  startGame();
}

startGame();
