<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荷物仕分けゲーム</title>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
 crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3f7;
  text-align:center;
}

/* 左右広告 */
.side-ad{
  position:fixed;
  top:120px;
  width:160px;
  z-index:999;
}

.left-ad{
  left:10px;
}

.right-ad{
  right:10px;
}

header{
  background:#263238;
  color:white;
  padding:18px;
}

.ad-top{
  max-width:900px;
  margin:15px auto;
}

.game{
  max-width:950px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.status{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  gap:10px;
  font-size:20px;
  font-weight:bold;
}

.package{
  margin:25px auto;
  width:260px;
  min-height:150px;
  background:#c98b4b;
  border:5px solid #8a5728;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 12px rgba(0,0,0,.2);
}

.package .icon{
  font-size:44px;
}

.package .label{
  font-size:22px;
  font-weight:bold;
  margin-top:8px;
}

.question{
  font-size:22px;
  font-weight:bold;
  margin:20px 0;
}

.choices{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.choice{
  padding:20px 10px;
  border:none;
  border-radius:14px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  background:#1976d2;
  color:white;
  transition:.2s;
}

.choice:hover{
  background:#0d47a1;
  transform:scale(1.03);
}

.choice:disabled{
  opacity:.7;
  cursor:not-allowed;
}

#message{
  min-height:35px;
  margin-top:18px;
  font-size:24px;
  font-weight:bold;
}

.correct{
  color:green;
}

.wrong{
  color:red;
}

.restart{
  margin-top:20px;
  padding:12px 30px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  cursor:pointer;
}

.restart:hover{
  background:#000;
}

/* スマホ */
@media(max-width:1200px){
  .side-ad{
    display:none;
  }
}

@media(max-width:700px){

  .choices{
    grid-template-columns:1fr;
  }

  .status{
    font-size:16px;
  }

  .package{
    width:200px;
  }
}
</style>
</head>

<body>

<!-- 左広告 -->
<div class="side-ad left-ad">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<!-- 右広告 -->
<div class="side-ad right-ad">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<header>
  <h1>📦 荷物仕分けゲーム</h1>
  <p>荷物の内容を見て、正しい仕分け先を選ぼう！</p>
</header>

<!-- 上広告 -->
<div class="ad-top">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<div class="game">

  <div class="status">
    <div>問題：<span id="qnum">1</span></div>
    <div>スコア：<span id="score">0</span></div>
    <div>ミス：<span id="miss">0</span></div>
  </div>

  <div class="package">
    <div class="icon">📦</div>
    <div class="label" id="packageLabel">読み込み中</div>
  </div>

  <div class="question">
    この荷物はどこへ送る？
  </div>

  <div class="choices" id="choices"></div>

  <div id="message"></div>

  <button class="restart" onclick="restartGame()">
    もう一度遊ぶ
  </button>

</div>

<script>

const quizData = [

{ item:"東京行きの通常荷物", answer:"関東エリア", choices:["関東エリア","関西エリア","九州エリア","北海道エリア"] },
{ item:"大阪行きの通常荷物", answer:"関西エリア", choices:["関東エリア","関西エリア","東北エリア","中部エリア"] },
{ item:"福岡行きの通常荷物", answer:"九州エリア", choices:["北海道エリア","九州エリア","関西エリア","関東エリア"] },
{ item:"札幌行きの通常荷物", answer:"北海道エリア", choices:["北海道エリア","東北エリア","中部エリア","関西エリア"] },
{ item:"仙台行きの通常荷物", answer:"東北エリア", choices:["関東エリア","東北エリア","九州エリア","関西エリア"] },
{ item:"名古屋行きの通常荷物", answer:"中部エリア", choices:["中部エリア","関西エリア","北海道エリア","九州エリア"] },
{ item:"冷凍食品", answer:"冷凍便", choices:["通常便","冷蔵便","冷凍便","ワレモノ便"] },
{ item:"生クリームケーキ", answer:"冷蔵便", choices:["通常便","冷蔵便","大型便","書類便"] },
{ item:"ガラスのコップ", answer:"ワレモノ便", choices:["通常便","ワレモノ便","冷凍便","大型便"] },
{ item:"テレビ", answer:"大型便", choices:["書類便","通常便","大型便","冷蔵便"] },

{ item:"契約書", answer:"書類便", choices:["書類便","冷凍便","大型便","ワレモノ便"] },
{ item:"花束", answer:"なまもの便", choices:["通常便","なまもの便","大型便","書類便"] },
{ item:"ノートパソコン", answer:"精密機器便", choices:["冷凍便","精密機器便","通常便","大型便"] },
{ item:"スマートフォン", answer:"精密機器便", choices:["精密機器便","冷蔵便","九州エリア","ワレモノ便"] },
{ item:"お米30kg", answer:"重量物便", choices:["通常便","書類便","重量物便","冷凍便"] },
{ item:"冷凍マグロ", answer:"冷凍便", choices:["冷蔵便","冷凍便","通常便","書類便"] },
{ item:"牛乳", answer:"冷蔵便", choices:["通常便","冷蔵便","大型便","関東エリア"] },
{ item:"陶器の皿", answer:"ワレモノ便", choices:["ワレモノ便","通常便","冷凍便","書類便"] },
{ item:"ソファ", answer:"大型便", choices:["大型便","書類便","冷蔵便","関西エリア"] },
{ item:"履歴書", answer:"書類便", choices:["冷凍便","書類便","大型便","なまもの便"] }

];

// 100問化
while(quizData.length < 100){
  quizData.push(...quizData.slice(0,20));
}

let questions = [];
let currentIndex = 0;
let score = 0;
let miss = 0;
let answered = false;

const packageLabel = document.getElementById("packageLabel");
const choicesEl = document.getElementById("choices");
const messageEl = document.getElementById("message");
const scoreEl = document.getElementById("score");
const missEl = document.getElementById("miss");
const qnumEl = document.getElementById("qnum");

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function startGame(){

  questions = shuffle([...quizData]);

  currentIndex = 0;
  score = 0;
  miss = 0;

  scoreEl.textContent = score;
  missEl.textContent = miss;

  showQuestion();
}

function showQuestion(){

  answered = false;

  if(currentIndex >= 100){

    packageLabel.textContent = "終了";

    choicesEl.innerHTML = "";

    messageEl.innerHTML =
      `🎉 ゲーム終了！<br>スコア：${score}`;

    return;
  }

  messageEl.textContent = "";
  messageEl.className = "";

  const q = questions[currentIndex];

  qnumEl.textContent = currentIndex + 1;

  packageLabel.textContent = q.item;

  choicesEl.innerHTML = "";

  q.choices.forEach(choice => {

    const btn = document.createElement("button");

    btn.className = "choice";

    btn.textContent = choice;

    btn.onclick = () => checkAnswer(choice);

    choicesEl.appendChild(btn);
  });
}

function checkAnswer(choice){

  if(answered) return;

  answered = true;

  const q = questions[currentIndex];

  const buttons =
    document.querySelectorAll(".choice");

  buttons.forEach(btn => btn.disabled = true);

  if(choice === q.answer){

    score += 10;

    messageEl.textContent =
      "✅ 正解！次の荷物へ移動中...";

    messageEl.className = "correct";

  }else{

    miss++;

    messageEl.textContent =
      `❌ ミス！ 正解は「${q.answer}」`;

    messageEl.className = "wrong";
  }

  scoreEl.textContent = score;
  missEl.textContent = miss;

  // 自動で次へ
  setTimeout(() => {

    currentIndex++;

    showQuestion();

  }, 900);
}

function restartGame(){

  startGame();
}

startGame();

</script>

</body>
</html>
